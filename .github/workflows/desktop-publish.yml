name: Publish Desktop App

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          - os: macos-14
            platform: mac
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: ""
          - os: windows-latest
            platform: win
            arch: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Use npm install (not npm ci) to ensure platform-specific optional deps install correctly
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-package-lock --legacy-peer-deps
        shell: bash

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -v 35.7.5 -m node_modules/better-sqlite3 ${{ matrix.arch && format('-a {0}', matrix.arch) || '' }}

      - name: Remove bun.lock to prevent electron-builder from using bun
        run: rm -f bun.lock
        shell: bash

      - name: Build and package desktop app
        shell: bash
        run: |
          set -euo pipefail
          package_cmd="npm run package:${{ matrix.platform }} -w @skillsgate/desktop -- ${{ matrix.arch && format('--{0}', matrix.arch) || '' }}"

          if [[ "${{ matrix.platform }}" != "mac" ]]; then
            eval "$package_cmd"
            exit 0
          fi

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "macOS packaging attempt $attempt/$max_attempts"
            if eval "$package_cmd"; then
              exit 0
            fi

            if [[ "$attempt" -eq "$max_attempts" ]]; then
              echo "macOS packaging failed after $max_attempts attempts"
              exit 1
            fi

            retry_delay=$((attempt * 30))
            echo "Retrying macOS packaging after ${retry_delay}s to work around transient notarization/network failures"
            sleep "$retry_delay"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
